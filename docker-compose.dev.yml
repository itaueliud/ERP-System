version: '3.9'
# Development override — hot reload, exposed ports, no SSL
services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    build: ~
    image: ~
    volumes:
      - ./backend/src:/app/src
      - ./logs:/app/logs
    command: npx tsx watch src/index.ts
    environment:
      NODE_ENV: development
    env_file:
      - backend/.env.development

  frontend:
    build: ~
    image: ~
    command: sh -c "npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_URL: http://localhost:3000
