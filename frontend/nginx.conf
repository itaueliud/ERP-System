# Nginx configuration for TechSwiftTrix ERP frontend
# Implements browser caching (Req 37.5) and gzip compression (Req 37.9)

server {
    listen 80;
    server_name app.tst.com;

    # Redirect HTTP → HTTPS (Req 20.9, 20.10)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.tst.com;

    root /usr/share/nginx/html;
    index index.html;

    # TLS configuration (Req 20.1)
    ssl_certificate     /etc/ssl/certs/tst.crt;
    ssl_certificate_key /etc/ssl/private/tst.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Compression (Req 37.4, 37.9) ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers (Req 20.11) ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss:;"
        always;

    # ── Browser caching (Req 37.5) ────────────────────────────────────────────

    # Hashed JS/CSS/font assets — immutable, cache for 1 year
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images — cache for 30 days
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # HTML — no cache so users always get the latest shell (Req 37.1)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Portal gateway routes (spec §3) — obscured URLs per role ─────────────
    # Portal 1 — CEO only
    location /gatewayalpha {
        alias /usr/share/nginx/html/ceo;
        try_files $uri $uri/ /ceo/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    # Portal 2 — CoS, CFO, EA (same URL, RBA loads correct dashboard)
    location /gatewaydelta {
        alias /usr/share/nginx/html/executive;
        try_files $uri $uri/ /executive/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    # Portal 3 — COO, CTO (same URL, RBA loads correct dashboard)
    location /gatewaysigma {
        alias /usr/share/nginx/html/clevel;
        try_files $uri $uri/ /clevel/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    # Portal 4 — All 3 COO departments incl. HoT & Trainers (same URL, RBA loads correct dept)
    location /gatewaynexus {
        alias /usr/share/nginx/html/operations;
        try_files $uri $uri/ /operations/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    # Portal 5 — All 3 CTO departments + Developer teams (same URL, RBA loads correct dept)
    location /gatewayvertex {
        alias /usr/share/nginx/html/technology;
        try_files $uri $uri/ /technology/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    # Portal 6 — Agents only
    location /gatewaypulse {
        alias /usr/share/nginx/html/agents;
        try_files $uri $uri/ /agents/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # ── SPA fallback (portal home / generic) ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must not be cached
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # ── API proxy (optional — remove if using a separate API server) ─────────
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
