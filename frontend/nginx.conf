# Nginx configuration for TechSwiftTrix ERP frontend
# HTTP-only by default; enable the HTTPS server block when SSL certs are available.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff font/woff2;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Browser caching ───────────────────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Portal gateway routes (spec §3) ───────────────────────────────────────
    location /gatewayalpha {
        alias /usr/share/nginx/html/ceo;
        try_files $uri $uri/ /ceo/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    location /gatewaydelta {
        alias /usr/share/nginx/html/executive;
        try_files $uri $uri/ /executive/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    location /gatewaysigma {
        alias /usr/share/nginx/html/clevel;
        try_files $uri $uri/ /clevel/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    location /gatewaynexus {
        alias /usr/share/nginx/html/operations;
        try_files $uri $uri/ /operations/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    location /gatewayvertex {
        alias /usr/share/nginx/html/technology;
        try_files $uri $uri/ /technology/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
    location /gatewaypulse {
        alias /usr/share/nginx/html/agents;
        try_files $uri $uri/ /agents/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── WebSocket proxy (Socket.IO) ───────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
