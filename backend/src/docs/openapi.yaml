openapi: 3.0.3
info:
  title: TechSwiftTrix ERP API
  version: 1.0.0
  description: |
    Comprehensive REST API for the TechSwiftTrix ERP System — a multi-tenant enterprise
    resource platform supporting operations across Africa. Covers authentication, user
    management, client management, payments, contracts, and audit logging.
  contact:
    email: support@techswifttrix.com
  license:
    name: Proprietary
    url: https://techswifttrix.com

servers:
  - url: http://localhost:3000
    description: Development
  - url: https://staging-api.techswifttrix.com
    description: Staging
  - url: https://api.techswifttrix.com
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Authentication
    description: Login, logout, and token management
  - name: Users
    description: User management and invitations
  - name: Clients
    description: Client records and CRM operations
  - name: Payments
    description: Payment initiation and history
  - name: Contracts
    description: Contract generation and management
  - name: Audit
    description: Audit logs and compliance records

paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: user@techswifttrix.com
              password: "SecurePass123!"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout and invalidate session
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /users:
    get:
      tags: [Users]
      summary: List all users (paginated)
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: role
          in: query
          schema:
            type: string
            enum: [CEO, CoS, CFO, COO, CTO, EA, HeadOfTrainers, Trainer, Agent, OperationsUser, TechStaff, Developer]
          description: Filter by role
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/invite:
    post:
      tags: [Users]
      summary: Invite a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUserRequest'
            example:
              email: newuser@techswifttrix.com
              role: Agent
              firstName: Jane
              lastName: Doe
      responses:
        '201':
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /clients:
    get:
      tags: [Clients]
      summary: List clients (paginated, filterable)
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [lead, active, inactive, churned]
          description: Filter by client status
        - name: search
          in: query
          schema:
            type: string
          description: Search by name or email
      responses:
        '200':
          description: Paginated list of clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
            example:
              firstName: John
              lastName: Kamau
              email: john.kamau@example.com
              phone: "+254712345678"
              company: Kamau Enterprises
              country: KE
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /clients/{id}:
    get:
      tags: [Clients]
      summary: Get client by ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Client details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /payments:
    get:
      tags: [Payments]
      summary: List payments
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, failed, refunded]
        - name: method
          in: query
          schema:
            type: string
            enum: [mpesa, airtel_money, bank_transfer, card]
      responses:
        '200':
          description: Paginated list of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /payments/initiate:
    post:
      tags: [Payments]
      summary: Initiate a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentRequest'
            example:
              clientId: "client-uuid-here"
              amount: 5000
              currency: KES
              method: mpesa
              phoneNumber: "+254712345678"
              description: "Invoice #INV-2024-001"
      responses:
        '201':
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /audit/logs:
    get:
      tags: [Audit]
      summary: Get audit logs (paginated)
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by user ID
        - name: action
          in: query
          schema:
            type: string
          description: Filter by action type
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Start date/time filter
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: End date/time filter
      responses:
        '200':
          description: Paginated audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /auth/login

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page

  responses:
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Validation failed
            details: [{ field: email, message: "must be a valid email" }]
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Unauthorized
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Forbidden
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Not found
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Internal server error

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    Pagination:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT access token
        expiresIn:
          type: integer
          description: Token expiry in seconds
        user:
          $ref: '#/components/schemas/UserSummary'

    UserSummary:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [CEO, CoS, CFO, COO, CTO, EA, HeadOfTrainers, Trainer, Agent, OperationsUser, TechStaff, Developer]

    UserListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'

    InviteUserRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [CEO, CoS, CFO, COO, CTO, EA, HeadOfTrainers, Trainer, Agent, OperationsUser, TechStaff, Developer]
        firstName:
          type: string
        lastName:
          type: string

    Client:
      type: object
      required: [id, firstName, lastName, email, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
        status:
          type: string
          enum: [lead, active, inactive, churned]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ClientResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Client'

    ClientListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Client'
        pagination:
          $ref: '#/components/schemas/Pagination'

    CreateClientRequest:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
        country:
          type: string

    Payment:
      type: object
      required: [id, clientId, amount, currency, method, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        amount:
          type: number
          format: float
        currency:
          type: string
          description: ISO 4217 currency code
        method:
          type: string
          enum: [mpesa, airtel_money, bank_transfer, card]
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        description:
          type: string
        reference:
          type: string
          description: External payment reference
        createdAt:
          type: string
          format: date-time

    PaymentResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Payment'

    PaymentListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        pagination:
          $ref: '#/components/schemas/Pagination'

    InitiatePaymentRequest:
      type: object
      required: [clientId, amount, currency, method]
      properties:
        clientId:
          type: string
          format: uuid
        amount:
          type: number
          format: float
          minimum: 1
        currency:
          type: string
          description: ISO 4217 currency code (e.g. KES, UGX, TZS)
        method:
          type: string
          enum: [mpesa, airtel_money, bank_transfer, card]
        phoneNumber:
          type: string
          description: Required for mpesa and airtel_money
        description:
          type: string

    AuditLog:
      type: object
      required: [id, userId, action, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userEmail:
          type: string
          format: email
        action:
          type: string
        resource:
          type: string
        resourceId:
          type: string
        ipAddress:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    AuditLogListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        pagination:
          $ref: '#/components/schemas/Pagination'
